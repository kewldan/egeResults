# Запуск: cp .env.example .env (заполнить BOT_TOKEN/ENCRYPTION_KEY/IDENTITY_SECRET),
# затем: docker compose up -d --build
#
# MONGO_URI и REDIS_URL ниже переопределяют значения из .env на имена сервисов
# compose-сети (в docker compose `environment` приоритетнее `env_file`).

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Рендерер карточек результатов (Bun + takumi-js). Бот ходит к нему по имени
  # сервиса; наружу порт не публикуем — он нужен только боту внутри сети compose.
  card-renderer:
    build: ./render-takumi
    restart: unless-stopped

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Адрес рендерера внутри сети compose (переопределяет .env).
      CARD_RENDERER_URL: http://card-renderer:3000
    depends_on:
      redis:
        condition: service_healthy
      card-renderer:
        condition: service_started
